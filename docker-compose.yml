version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: reporadar-postgres
    environment:
      POSTGRES_DB: reporadar
      POSTGRES_USER: reporadar
      POSTGRES_PASSWORD: reporadar
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
