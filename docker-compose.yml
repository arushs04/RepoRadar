version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: supplygraph-postgres
    environment:
      POSTGRES_DB: supplygraph
      POSTGRES_USER: supplygraph
      POSTGRES_PASSWORD: supplygraph
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
